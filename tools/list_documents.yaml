identity:
  name: list_documents
  author: leslie2046
  label:
    en_US: List Documents
    zh_Hans: 获取文档列表
description:
  human:
    en_US: List documents in a Dify knowledge base and optionally filter them by keyword or status.
    zh_Hans: 获取 Dify 知识库中的文档列表，可按关键词或状态筛选。
  llm: List documents in a Dify knowledge base and optionally filter them by keyword or status.
parameters:
  - name: dataset_id
    type: string
    required: true
    form: llm
    label:
      en_US: Dataset ID
      zh_Hans: 知识库 ID
    human_description:
      en_US: Knowledge base id used to list documents.
      zh_Hans: 用于获取文档列表的知识库 ID。
    llm_description: Required Dify knowledge base id used to list documents.
  - name: keyword
    type: string
    required: false
    form: llm
    label:
      en_US: Keyword
      zh_Hans: 关键词
    human_description:
      en_US: Optional keyword used to filter document names.
      zh_Hans: 可选，用于按文档名称筛选的关键词。
    llm_description: Optional keyword used to filter document names.
  - name: status
    type: select
    required: false
    form: form
    label:
      en_US: Status
      zh_Hans: 状态
    human_description:
      en_US: Optional document status filter.
      zh_Hans: 可选，文档状态筛选。
    llm_description: Optional document status filter.
    options:
      - value: queuing
        label:
          en_US: Queuing
          zh_Hans: 排队中
      - value: indexing
        label:
          en_US: Indexing
          zh_Hans: 索引中
      - value: paused
        label:
          en_US: Paused
          zh_Hans: 已暂停
      - value: error
        label:
          en_US: Error
          zh_Hans: 错误
      - value: available
        label:
          en_US: Available
          zh_Hans: 可用
      - value: disabled
        label:
          en_US: Disabled
          zh_Hans: 已禁用
      - value: archived
        label:
          en_US: Archived
          zh_Hans: 已归档
  - name: page
    type: number
    required: false
    form: form
    default: 1
    label:
      en_US: Page
      zh_Hans: 页码
    human_description:
      en_US: Page number to retrieve.
      zh_Hans: 要获取的页码。
    llm_description: Optional page number for pagination.
    min: 1
  - name: limit
    type: number
    required: false
    form: form
    default: 20
    label:
      en_US: Limit
      zh_Hans: 每页数量
    human_description:
      en_US: Number of documents to return per page.
      zh_Hans: 每页返回的文档数量。
    llm_description: Optional number of documents to return per page.
    min: 1
    max: 100
output_schema:
  type: object
  properties:
    dataset_id:
      type: string
      description: Knowledge base id used for listing documents.
    page:
      type: integer
      description: Current page number.
    limit:
      type: integer
      description: Number of items per page.
    total:
      type: integer
      description: Total number of matching documents.
    has_more:
      type: boolean
      description: Whether more pages exist.
    count:
      type: integer
      description: Number of returned documents in the current page.
    result:
      type: array
      description: Normalized document records.
      items:
        type: object
extra:
  python:
    source: tools/list_documents.py
