credentials_for_provider:
  base_url:
    label:
      en_US: Base URL
      zh_Hans: Base URL
    placeholder:
      en_US: https://your-dify-host/v1
      zh_Hans: https://your-dify-host/v1
    help:
      en_US: Dify Knowledge API base URL. The plugin also accepts a host URL and appends /v1 automatically.
      zh_Hans: Dify Knowledge API 地址。也可以只填主机地址，插件会自动补上 /v1。
    required: true
    type: text-input
  api_key:
    label:
      en_US: API Key
      zh_Hans: API Key
    placeholder:
      en_US: Please input your Dify Service API key
      zh_Hans: 请输入 Dify Service API Key
    required: true
    type: secret-input
identity:
  author: leslie2046
  name: dify_knowledge
  label:
    en_US: Dify Knowledge
    zh_Hans: Dify 知识库
  description:
    en_US: List Dify knowledge bases, list documents, and retrieve knowledge chunks.
    zh_Hans: 获取 Dify 知识库列表、文档列表并检索分段内容。
  icon: icon.svg
  tags:
    - rag
tools:
  - tools/list_datasets.yaml
  - tools/list_documents.yaml
  - tools/retrieve_chunks.yaml
extra:
  python:
    source: provider/dify_knowledge.py
